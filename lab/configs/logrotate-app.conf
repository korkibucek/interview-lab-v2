# Healthy log rotation for the chatty app logger.
# break-lab.sh corrupts this: it points the glob at a non-existent directory
# (/var/log/appp) and drops copytruncate, so rotation silently never happens
# and /var/log/app/app.log grows without bound.
/var/log/app/*.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    copytruncate
}
