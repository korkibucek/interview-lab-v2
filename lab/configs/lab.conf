# Healthy lab web server (installed to /etc/nginx/conf.d/lab.conf).
# break-lab.sh rewrites the listen ports to 8080 to take the service off :80.
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
