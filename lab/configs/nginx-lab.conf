# Healthy nginx site for the lab web service.
# break-lab.sh rewrites the listen ports to 8080 to take the service off :80.
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /var/www/lab;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
