# Minimal main nginx config for the lab (AlmaLinux 10).
# Installed by setup-lab.sh in place of the stock nginx.conf (original backed up
# to the lab state dir) so the lab's conf.d/lab.conf is the single server block
# and there is no duplicate default_server from the distro default.
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    sendfile   on;

    include /etc/nginx/conf.d/*.conf;
}
