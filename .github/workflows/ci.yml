name: ci

on:
  push:
    branches: [ main ]
  pull_request:

# The lab targets AlmaLinux 10. GitHub-hosted runners are Ubuntu VMs, so we run
# the static checks *inside* an almalinux:10 container to match the target OS.
jobs:
  smoke:
    runs-on: ubuntu-latest
    container:
      image: almalinux:10
    steps:
      - name: Install prerequisites (git for checkout, ShellCheck for linting)
        run: |
          dnf -y install git-core tar findutils
          dnf -y install epel-release || true
          # ShellCheck is mandatory: a failure here must fail CI, not be skipped.
          dnf -y install ShellCheck
          command -v shellcheck

      - uses: actions/checkout@v4

      - name: Run smoke tests (syntax + shellcheck + leak guard)
        run: bash scripts/smoke-test.sh
